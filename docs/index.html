<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyber RCSA — AI-Enabled Workflow Demo</title>
  <meta name="description" content="Interactive demo of an AI-assisted Cyber RCSA workflow with swimlane orchestration, decision routing, and human-in-the-loop governance." />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="assets/capgemini-spade.png" alt="Capgemini" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';" />
      <div class="brand-mark" style="display:none;">RC</div>
      <div class="brand-text">
        <span class="title">Cyber RCSA — AI-Enabled Workflow</span>
        <span class="sub">Orchestration demo · barrypan10/RCSA-Workstream</span>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="state-pill">
      <span class="dot"></span>
      <span id="state-pill-text">Initializing…</span>
    </div>
    <button id="reset-btn" class="btn" title="Reset to initial state">Reset simulation</button>
  </header>

  <nav class="tabbar" role="tablist" aria-label="Main views">
    <button class="tab is-active" role="tab" data-tab="map" aria-selected="true" aria-controls="tab-map">
      <span class="tab-num">1</span>
      <span class="tab-label">Workflow Map</span>
      <span class="tab-sub">Where you are in the workstream</span>
    </button>
    <button class="tab" role="tab" data-tab="detail" aria-selected="false" aria-controls="tab-detail">
      <span class="tab-num">2</span>
      <span class="tab-label">Step Detail</span>
      <span class="tab-sub" id="tab-detail-sub">GRC view of selected step</span>
    </button>
    <div class="tabbar-spacer"></div>
    <button class="tab tab-report is-hidden" role="tab" data-tab="report" aria-selected="false" aria-controls="tab-report">
      <span class="tab-label">📄 Findings Report</span>
      <span class="tab-sub">Available after 2LOD approval</span>
    </button>
  </nav>

  <!-- Tab 1: Workflow Map -->
  <main class="app" id="tab-map" role="tabpanel">

    <section class="canvas-wrap" aria-label="Workflow swimlane">
      <div class="canvas-header">
        <h2>Workflow Orchestration</h2>
        <div class="legend">
          <span class="legend-item"><span class="legend-swatch legend-ai"></span> AI step</span>
          <span class="legend-item"><span class="legend-swatch legend-human"></span> Human checkpoint</span>
          <span class="legend-item"><span class="legend-swatch legend-decision"></span> Decision</span>
          <span class="legend-item"><span class="legend-swatch legend-loop"></span> Loop-back</span>
        </div>
      </div>
      <div class="canvas-scroll">
        <div id="swimlanes" class="swimlanes" role="group" aria-label="Process swimlanes">
          <!-- lanes + nodes injected by app.js -->
        </div>
      </div>
    </section>

    <aside id="panel" class="panel" aria-live="polite">
      <!-- detail panel injected by app.js -->
    </aside>

  </main>

  <!-- Tab 2: Step Detail (GRC-style) -->
  <main class="detail-view is-hidden" id="tab-detail" role="tabpanel">
    <!-- injected by app.js -->
  </main>

  <!-- Tab 3: Findings Report (only available after Step 11 approval) -->
  <main class="report-view is-hidden" id="tab-report" role="tabpanel">
    <!-- injected by app.js -->
  </main>

  <section class="audit" id="audit">
    <div class="audit-head" id="audit-head">
      <h2>Audit Trail</h2>
      <span class="count" id="audit-count">0 events</span>
      <span class="toggle" id="audit-toggle">▾</span>
    </div>
    <div class="audit-list" id="audit-list">
      <div class="audit-empty">No events yet. Begin the simulation from the Trigger Event.</div>
    </div>
  </section>

  <script src="assets/workflow.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
